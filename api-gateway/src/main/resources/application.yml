server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cloud:
    gateway:
      routes:
        # Auth Service — público
        # JWT validation is handled by JwtAuthenticationFilter (GlobalFilter)
        # which whitelists /api/v1/auth/** paths automatically.
        - id: auth-service
          uri: http://${AUTH_SERVICE_HOST:localhost}:8081
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # Finance Service — requer JWT (validado pelo GlobalFilter)
        - id: finance-service
          uri: http://${FINANCE_SERVICE_HOST:localhost}:8082
          predicates:
            - Path=/api/v1/accounts/**, /api/v1/transactions/**, /api/v1/categories/**, /api/v1/reports/**, /api/v1/budgets/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # AI Service — requer JWT (validado pelo GlobalFilter)
        - id: ai-service
          uri: http://${AI_SERVICE_HOST:localhost}:8083
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        # Notification Service — requer JWT (validado pelo GlobalFilter)
        - id: notification-service
          uri: http://${NOTIFICATION_SERVICE_HOST:localhost}:8084
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "${CORS_ALLOWED_ORIGIN_LOCAL:http://localhost:5173}"
              - "${CORS_ALLOWED_ORIGIN_PROD:https://smartfinance.example.com}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# JWT secret — shared with all services for token validation
jwt:
  secret: ${JWT_SECRET:smartfinance-dev-secret-key-minimum-32chars}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.smartfinance.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

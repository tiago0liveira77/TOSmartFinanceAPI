server:
  port: 8082

spring:
  application:
    name: finance-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartfinance_finance}
    username: ${SPRING_DATASOURCE_USERNAME:smartfinance}
    password: ${SPRING_DATASOURCE_PASSWORD:smartfinance}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:smartfinance}
    password: ${RABBITMQ_PASSWORD:smartfinance}
    virtual-host: /

# RabbitMQ exchange/queue names
rabbitmq:
  exchange: smartfinance.events
  queues:
    transactions-imported: smartfinance.transactions.imported
    transaction-created: smartfinance.transaction.created
    budget-threshold: smartfinance.budget.threshold.reached
    ai-categorization-completed: smartfinance.ai.categorization.completed

# JWT secret (para validar tokens do auth-service)
jwt:
  secret: ${JWT_SECRET:smartfinance-dev-secret-key-minimum-32chars}

# CSV import settings
csv:
  max-file-size: 10MB
  batch-size: 500

management:
  endpoints:
    web:
      exposure:
        include: health, info

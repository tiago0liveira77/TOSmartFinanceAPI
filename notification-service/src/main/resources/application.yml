server:
  port: 8084

spring:
  application:
    name: notification-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartfinance_notifications}
    username: ${SPRING_DATASOURCE_USERNAME:smartfinance}
    password: ${SPRING_DATASOURCE_PASSWORD:smartfinance}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:smartfinance}
    password: ${RABBITMQ_PASSWORD:smartfinance}
    virtual-host: /

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# RabbitMQ queues consumed
rabbitmq:
  exchange: smartfinance.events
  queues:
    transactions-imported: smartfinance.transactions.imported
    budget-threshold: smartfinance.budget.threshold.reached
    transaction-created: smartfinance.transaction.created

# App email sender
notification:
  email:
    from: ${NOTIFICATION_EMAIL_FROM:noreply@smartfinance.app}
    from-name: SmartFinance

# JWT secret
jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health, info

server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartfinance_auth}
    username: ${SPRING_DATASOURCE_USERNAME:smartfinance}
    password: ${SPRING_DATASOURCE_PASSWORD:smartfinance}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "${OAUTH2_REDIRECT_URI:http://localhost:8081}/login/oauth2/code/google"

# JWT configuration
jwt:
  secret: ${JWT_SECRET:smartfinance-dev-secret-key-minimum-32chars}
  access-token-expiration: 900        # 15 minutos em segundos
  refresh-token-expiration: 604800    # 7 dias em segundos

# CORS — apenas para acesso direto (via gateway em prod)
cors:
  allowed-origins:
    - "${CORS_ALLOWED_ORIGIN:http://localhost:5173}"
    - "http://192.168.1.200:5173"

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized
